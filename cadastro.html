<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/cadastro.css">
</head>

<body>
    <header>
        <a href="index.html">
            <img src="img/light_logo_horizontal.png" alt="DevIdeas" id="logo">
        </a>
        <nav>
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="#about_us">Quem Somos</a>
                </li>
                <li>
                    <a href="services.html">Serviços</a>
                </li>
                <li>
                    <a href="contact.html">
                        <button class="buttons header_buttons"><i class="fa-solid fa-right-long"></i> Entre em
                            Contato</button>
                    </a>
                </li>
                <li>
                    <a href="login.html">
                        <button class="buttons header_buttons"><i class="fa-solid fa-user"></i> Área do Cliente</button>
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <div class="box">
        <div>
            <form class="cadastro">
                <h1 class="titulo_cadastro">Cadastro</h1>

                <div class="input-group">
                    <input required="" type="text" class="input">
                    <label class="user-label">Nome</label>
                </div>
                <div class="input-group">
                    <input required="" type="text" class="input">
                    <label class="user-label">Email</label>
                </div>


                <div class="input-group">
                <input required="" type="number" class="input">
                <label class="user-label">Telefone</label>
                </div>
                
                <div class="input-group">
                    <input required="" type="password" class="input">
                    <label class="user-label">Senha</label>
                </div>
                
                <div class="input-group">
                    <input required="" type="password" class="input">
                    <label class="user-label">Confirmar Senha</label>
                </div>
            
                <a class="posicao" href="login.html"><input class="button" value="Cadastrar"></a>
            </form>
        </div>

    </div>
</body>

</html>
